<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

<body>

  <!-- ===== Header / Branding ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-ring">
        <img src="assets/images/logo.png" alt="โลโก้ กวจ.สสว.วท.กห."

    </div>
  </main>

  <footer class="site-footer">
    <p class="footer-line">พัฒนาโดย <span class="dev-name">ส.อ.ฐานทัพ พุ่มเกิด</span> เจ้าหน้าที่ติดตามเทคโนโลยี กวจ.สสว.วท.กห. (โปรแกรมเมอร์)</p>

  </footer>

  <div class="toast" id="toast" role="status"></div>

  <!-- Firebase (compat build ใช้ง่ายกับ Vanilla JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
